<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" /></noscript>
    <!-- Critical CSS: LCP(배너)·FCP용 최소 스타일, 메인 번들 로딩 전 첫 페인트 개선 -->
    <style>
      body{background-color:#000!important;color:#fff!important;margin:0;min-width:320px}
      #root{min-height:100vh}
      .banner{position:relative;height:600px;display:flex;align-items:center;overflow:hidden}
      .banner-picture{position:absolute;inset:0;z-index:0}
      .banner-img{width:100%;height:100%;object-fit:cover;object-position:center}
      .banner-info{width:40%;margin-left:30px;z-index:1}
      @media (max-width:600px){.banner{height:50vh;min-height:280px}.banner-info{width:90%;margin-left:16px}}
    </style>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>NETFLIX</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
