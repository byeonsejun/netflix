<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" /></noscript>
    <!-- Critical CSS: FCP/LCP용 above-fold 스타일 인라인 -->
    <style>
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
      html{-webkit-text-size-adjust:100%}
      body{background-color:#000!important;color:#fff!important;margin:0;min-width:320px;font-family:'BebasNeue-Regular',sans-serif;-webkit-font-smoothing:antialiased}
      ul,li{list-style:none}
      #root{min-height:100vh}
      #header>nav{border-bottom:solid 1px rgba(255,255,255,.3)}
      .navbar{padding:.5rem 1rem}
      .banner{position:relative;height:600px;display:flex;align-items:center;overflow:hidden}
      .banner-picture{position:absolute;inset:0;z-index:0}
      .banner-img{width:100%;height:100%;object-fit:cover;object-position:center}
      .banner::before{position:absolute;width:100%;height:100%;content:'';background:linear-gradient(to right,#000,transparent);z-index:1}
      .banner-info{width:40%;margin-left:30px;z-index:1}
      .banner-info h1{font-size:2rem;margin-bottom:.5rem}
      .card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
      @media(max-width:600px){.banner{height:50vh;min-height:280px}.banner-info{width:90%;margin-left:16px}.banner-info h1{font-size:1.4rem}}
    </style>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>NETFLIX</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
